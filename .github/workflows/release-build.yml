name: Release Build

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build-and-upload:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build extension
        run: pnpm build

      - name: Package dist
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          ARCHIVE="scalp-alt-click-${VERSION}.zip"
          cd dist
          zip -r "../${ARCHIVE}" .

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: scalp-alt-click-${{ github.event.release.tag_name }}.zip
